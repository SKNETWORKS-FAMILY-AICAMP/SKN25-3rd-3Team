{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}냉털봇 — 너의 냉장고를 구해줘{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🧊</text></svg>">
  <link rel="stylesheet" href="{% static 'recipes/css/fridge.css' %}">
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-inner">
      <a href="{% url 'recipes:index' %}" class="top-logo">🧊 냉털봇</a>
      <nav class="top-links">
        {% if user.is_authenticated %}
          <a href="{% url 'recipes:favorites' %}" class="top-link">★ 내 저장 레시피</a>
          <span class="top-user">{{ user.username }}님</span>
          <form method="post" action="{% url 'recipes:logout' %}" class="top-logout-form">
            {% csrf_token %}
            <button type="submit" class="top-link top-logout">로그아웃</button>
          </form>
        {% else %}
          <a href="{% url 'recipes:login' %}" class="top-link">로그인</a>
          <a href="{% url 'recipes:signup' %}" class="top-link top-link-cta">회원가입</a>
        {% endif %}
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
